version: '3.8'

services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # KRaft mode — no Zookeeper required (Kafka 3.3+)
  kafka:
    image: apache/kafka:latest
    ports:
      - "9094:9094"   # external listener — use localhost:9094 from host tools
    environment:
      # KRaft: this node is both broker and controller
      - KAFKA_NODE_ID=0
      - KAFKA_PROCESS_ROLES=controller,broker
      - KAFKA_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      # Fixed cluster ID required for KRaft (22-char base64url UUID)
      - CLUSTER_ID=q1Wx3N6bSUO69JWbQPnq1Q

      # Three listeners:
      #   PLAINTEXT  — internal, used by other containers  (kafka:9092)
      #   CONTROLLER — internal, used by KRaft consensus   (kafka:9093)
      #   EXTERNAL   — exposed to host machine             (localhost:9094)
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT

      # Topic defaults (auto-create off — engine admin creates topics on startup)
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=false
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1

      # Retention: keep order events for 7 days so consumer can replay on restart
      - KAFKA_LOG_RETENTION_HOURS=168
    volumes:
      - kafkadata:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      start_period: 30s
      interval: 10s
      timeout: 10s
      retries: 10

  # ── Application Services ─────────────────────────────────────────────────────

  api:
    build:
      context: ./backend/api
    environment:
      - PORT=8001
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/postgres
      - REDIS_URL=redis://redis:6379
      - ENGINE_URL=http://engine:8002
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_CLIENT_ID=api
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
    ports:
      - "8001:8001"
    command: >
      sh -c "npx prisma migrate deploy && npm start"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  engine:
    build:
      context: ./backend/engine
    environment:
      - PORT=8002
      - REDIS_URL=redis://redis:6379
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_CLIENT_ID=engine
      - POLLING_INTERVAL=5000
      - SYMBOLS=ADANIENT.NS,ADANIPORTS.NS,APOLLOHOSP.NS,ASIANPAINT.NS,AXISBANK.NS,BAJAJ-AUTO.NS,BAJFINANCE.NS,BAJAJFINSV.NS,BEL.NS,BHARTIARTL.NS,BPCL.NS,BRITANNIA.NS,CIPLA.NS,COALINDIA.NS,DIVISLAB.NS,DRREDDY.NS,EICHERMOT.NS,GRASIM.NS,HCLTECH.NS,HDFCBANK.NS,HDFCLIFE.NS,HEROMOTOCO.NS,HINDALCO.NS,HINDUNILVR.NS,ICICIBANK.NS,INDUSINDBK.NS,INFY.NS,ITC.NS,JSWSTEEL.NS,KOTAKBANK.NS,LT.NS,LTIM.NS,MARUTI.NS,M&M.NS,NESTLEIND.NS,NTPC.NS,ONGC.NS,POWERGRID.NS,RELIANCE.NS,SBILIFE.NS,SBIN.NS,SHRIRAMFIN.NS,SUNPHARMA.NS,TATACONSUM.NS,TMCV.NS,TATASTEEL.NS,TCS.NS,TECHM.NS,TITAN.NS,ULTRACEMCO.NS,UPL.NS,WIPRO.NS
    ports:
      - "8002:8002"
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  ws:
    build:
      context: ./backend/ws
    environment:
      - PORT=8003
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
    ports:
      - "8003:8003"
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    environment:
      - NEXT_PUBLIC_BACKEND_URL=http://localhost:8001
      - NEXT_PUBLIC_MARKET_URL=http://localhost:8002
      - NEXT_PUBLIC_MARKET_WS_URL=ws://localhost:8003
    ports:
      - "3000:3000"
    depends_on:
      - api
      - engine
      - ws

volumes:
  pgdata:
  kafkadata:
